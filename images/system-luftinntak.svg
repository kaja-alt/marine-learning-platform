<text x="805.0" y="499.5" text-anchor="middle" class="label">MAP/IAT sensor</text>
<text x="805.0" y="527.5" text-anchor="middle" class="small">purple</text>
<line x1="145.0" y1="347.5" x2="355.0" y2="337.5" class="arrow flow-cyan"/>
<rect x="180.0" y="324.5" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="250.0" y="342.5" text-anchor="middle" class="tiny">frisk luft</text>
<line x1="355.0" y1="337.5" x2="575.0" y2="337.5" class="arrow flow-cyan"/>
