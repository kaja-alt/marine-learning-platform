<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
<title id="title">Luftinntak</title>
<desc id="desc">Fra friskluft via filter og turbo til innsugsmanifold</desc>

    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
      </marker>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
      </filter>
      <style>
        .title{font:700 34px Arial,Helvetica,sans-serif;fill:#172033}
        .subtitle{font:400 17px Arial,Helvetica,sans-serif;fill:#526071}
        .label{font:700 16px Arial,Helvetica,sans-serif;fill:#172033}
        .small{font:400 13px Arial,Helvetica,sans-serif;fill:#526071}
        .tiny{font:400 12px Arial,Helvetica,sans-serif;fill:#526071}
        .arrow{fill:none;stroke:#334155;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
        .flow-blue{stroke:#2563eb}.flow-red{stroke:#dc2626}.flow-green{stroke:#0f766e}.flow-orange{stroke:#ea580c}.flow-cyan{stroke:#0891b2}.flow-purple{stroke:#7c3aed}.flow-slate{stroke:#334155}.flow-gray{stroke:#64748b}
      </style>
    </defs>
<rect width="1280" height="760" rx="0" fill="#f8fafc"/>
<text x="48" y="58" class="title">Luftinntak</text>
<text x="48" y="88" class="subtitle">Fra friskluft via filter og turbo til innsugsmanifold</text>
<line x1="48" y1="126" x2="1232" y2="126" stroke="#e2e8f0" stroke-width="1"/>
<line x1="48" y1="324" x2="1232" y2="324" stroke="#e2e8f0" stroke-width="1"/>
<line x1="48" y1="522" x2="1232" y2="522" stroke="#e2e8f0" stroke-width="1"/>
<rect x="70" y="305" width="150" height="85" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
<text x="145.0" y="339.5" text-anchor="middle" class="label">Motorromsluft</text>
<text x="145.0" y="367.5" text-anchor="middle" class="small">cyan</text>
<path d="M280,303 C280,279 430,279 430,303 L430,372 C430,396 280,396 280,372 Z" fill="#e2e8f0" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
<ellipse cx="355.0" cy="303" rx="75.0" ry="18" fill="#e2e8f0" stroke="#334155" stroke-width="2.5"/>
<text x="355.0" y="329.5" text-anchor="middle" class="label">Luftfilter</text>
<text x="355.0" y="357.5" text-anchor="middle" class="small">cyan</text>
