<text x="805.0" y="329.5" text-anchor="middle" class="label">Intercooler</text>
<text x="805.0" y="357.5" text-anchor="middle" class="small">cyan</text>
<rect x="950" y="295" width="170" height="90" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
<text x="1035.0" y="332.0" text-anchor="middle" class="label">Innsugsmanifold</text>
