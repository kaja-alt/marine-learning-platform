<line x1="575.0" y1="337.5" x2="805.0" y2="337.5" class="arrow flow-orange"/>
<rect x="620.0" y="319.5" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="690.0" y="337.5" text-anchor="middle" class="tiny">trykkluft</text>
<line x1="805.0" y1="337.5" x2="1035.0" y2="340.0" class="arrow flow-cyan"/>
<rect x="850.0" y="320.75" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="920.0" y="338.75" text-anchor="middle" class="tiny">kjølt luft</text>
<line x1="805.0" y1="507.5" x2="1035.0" y2="340.0" class="arrow flow-purple"/>
<rect x="850.0" y="405.75" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="920.0" y="423.75" text-anchor="middle" class="tiny">måling</text>
<rect x="48" y="690" width="1184" height="42" rx="10" fill="#fff" stroke="#e2e8f0"/>
<text x="64" y="716" class="small">Tett filter, lekkasje etter turbo eller feil sensor kan oppleves som lav effekt.</text>
</svg>
