<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Feilsøkingsflyt kapittel 8</title>
  <desc id="desc">Plassholder for feilsøkingsflyt fra symptom til dokumentert løsning.</desc>
  <rect width="980" height="520" fill="#f8fafc"/>
  <text x="48" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Feilsøkingsflyt</text>
  <text x="48" y="84" font-family="Arial, sans-serif" font-size="18" fill="#334155">Kapittel 8: Dokumentasjon av serviceforespørsler og ordreoppsett</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <g font-family="Arial, sans-serif" font-size="16" fill="#0f172a">
    <rect x="60" y="135" width="190" height="72" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
    <text x="84" y="166">Symptom mottatt</text><text x="84" y="190">fra kunde/verksted</text>
    <line x1="250" y1="171" x2="340" y2="171" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="340" y="135" width="190" height="72" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
    <text x="364" y="166">Samle data</text><text x="364" y="190">SN, bilder, historikk</text>
    <line x1="530" y1="171" x2="620" y2="171" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="620" y="135" width="220" height="72" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
    <text x="644" y="166">Kontroller katalog</text><text x="644" y="190">modell, variant, del</text>
    <line x1="730" y1="207" x2="730" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="620" y="280" width="220" height="72" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
    <text x="644" y="311">Test enkel årsak</text><text x="644" y="335">filter, væske, kontakt</text>
    <line x1="620" y1="316" x2="530" y2="316" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="310" y="280" width="220" height="72" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
    <text x="334" y="311">Velg tiltak</text><text x="334" y="335">del, service eller mer data</text>
    <line x1="310" y1="316" x2="220" y2="316" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="60" y="280" width="160" height="72" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
    <text x="84" y="311">Dokumenter</text><text x="84" y="335">og svar kunde</text>
  </g>
</svg>
