<text x="486.25" y="362.5" text-anchor="middle" class="tiny">reduksjon</text>
<line x1="585.0" y1="362.5" x2="810.0" y2="362.5" class="arrow flow-blue"/>
<rect x="627.5" y="344.5" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="697.5" y="362.5" text-anchor="middle" class="tiny">drift</text>
<line x1="810.0" y1="362.5" x2="1015.0" y2="362.5" class="arrow flow-blue"/>
<rect x="842.5" y="344.5" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="912.5" y="362.5" text-anchor="middle" class="tiny">gjennomføring</text>
<line x1="1015.0" y1="362.5" x2="1165.0" y2="360.0" class="arrow flow-blue"/>
<rect x="1020.0" y="343.25" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="1090.0" y="361.25" text-anchor="middle" class="tiny">thrust</text>
<line x1="387.5" y1="525.0" x2="585.0" y2="362.5" class="arrow flow-orange"/>
<rect x="416.25" y="425.75" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="486.25" y="443.75" text-anchor="middle" class="tiny">alignment</text>
<rect x="48" y="690" width="1184" height="42" rx="10" fill="#fff" stroke="#e2e8f0"/>
<text x="64" y="716" class="small">Vibrasjon og støy kan komme fra propell, aksel, oppretting, gear, motorfester eller belastning.</text>
</svg>
