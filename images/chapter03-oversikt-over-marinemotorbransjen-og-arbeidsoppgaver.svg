<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Kapittel 3: Oversikt over marinemotorbransjen og arbeids</title>
  <desc id="desc">Plassholderdiagram for opplæringshåndbok om marine dieselmotorer og reservedeler.</desc>
  <rect width="960" height="360" fill="#f8fafc"/>
  <rect x="40" y="40" width="880" height="280" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="70" y="90" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Kapittel 3</text>
  <text x="70" y="130" font-family="Arial, sans-serif" font-size="22" fill="#334155">Oversikt over marinemotorbransjen og arbeids</text>
  <g transform="translate(90 185)">
    <rect x="0" y="0" width="190" height="58" rx="6" fill="#7c3aed" opacity="0.12" stroke="#7c3aed"/>
    <text x="18" y="36" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">Kundeinfo</text>
    <line x1="190" y1="29" x2="300" y2="29" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="300" y="0" width="190" height="58" rx="6" fill="#7c3aed" opacity="0.12" stroke="#7c3aed"/>
    <text x="318" y="36" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">Identifikasjon</text>
    <line x1="490" y1="29" x2="600" y2="29" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="600" y="0" width="190" height="58" rx="6" fill="#7c3aed" opacity="0.12" stroke="#7c3aed"/>
    <text x="618" y="36" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">Riktig del</text>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
</svg>
