<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
<title id="title">CAN-bus</title>
<desc id="desc">Datakommunikasjon mellom motor, panel og andre moduler</desc>

    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
      </marker>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
      </filter>
      <style>
        .title{font:700 34px Arial,Helvetica,sans-serif;fill:#172033}
        .subtitle{font:400 17px Arial,Helvetica,sans-serif;fill:#526071}
        .label{font:700 16px Arial,Helvetica,sans-serif;fill:#172033}
        .small{font:400 13px Arial,Helvetica,sans-serif;fill:#526071}
        .tiny{font:400 12px Arial,Helvetica,sans-serif;fill:#526071}
        .arrow{fill:none;stroke:#334155;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
        .flow-blue{stroke:#2563eb}.flow-red{stroke:#dc2626}.flow-green{stroke:#0f766e}.flow-orange{stroke:#ea580c}.flow-cyan{stroke:#0891b2}.flow-purple{stroke:#7c3aed}.flow-slate{stroke:#334155}.flow-gray{stroke:#64748b}
      </style>
    </defs>
<rect width="1280" height="760" rx="0" fill="#f8fafc"/>
<text x="48" y="58" class="title">CAN-bus</text>
<text x="48" y="88" class="subtitle">Datakommunikasjon mellom motor, panel og andre moduler</text>
<line x1="48" y1="126" x2="1232" y2="126" stroke="#e2e8f0" stroke-width="1"/>
<line x1="48" y1="324" x2="1232" y2="324" stroke="#e2e8f0" stroke-width="1"/>
<line x1="48" y1="522" x2="1232" y2="522" stroke="#e2e8f0" stroke-width="1"/>
<rect x="100" y="320" width="160" height="95" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
<text x="180.0" y="359.5" text-anchor="middle" class="label">Motor ECU</text>
<text x="180.0" y="387.5" text-anchor="middle" class="small">purple</text>
<rect x="360" y="180" width="160" height="95" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
<text x="440.0" y="219.5" text-anchor="middle" class="label">Display</text>
<text x="440.0" y="247.5" text-anchor="middle" class="small">cyan</text>
<rect x="360" y="460" width="160" height="95" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
<text x="440.0" y="499.5" text-anchor="middle" class="label">Gear/drive modul</text>
<text x="440.0" y="527.5" text-anchor="middle" class="small">slate</text>
<rect x="620" y="320" width="160" height="95" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
<text x="700.0" y="359.5" text-anchor="middle" class="label">Gateway</text>
<text x="700.0" y="387.5" text-anchor="middle" class="small">blue</text>
<rect x="900" y="180" width="160" height="95" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
<text x="980.0" y="219.5" text-anchor="middle" class="label">Diagnoseverktøy</text>
<text x="980.0" y="247.5" text-anchor="middle" class="small">green</text>
<rect x="900" y="460" width="160" height="95" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
<text x="980.0" y="499.5" text-anchor="middle" class="label">Alarm / logger</text>
<text x="980.0" y="527.5" text-anchor="middle" class="small">orange</text>
<rect x="80" y="115" width="100" height="55" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
<text x="130.0" y="134.5" text-anchor="middle" class="label">120 ohm</text>
<text x="130.0" y="162.5" text-anchor="middle" class="small">gray</text>
<rect x="1075" y="600" width="100" height="55" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
<text x="1125.0" y="619.5" text-anchor="middle" class="label">120 ohm</text>
<text x="1125.0" y="647.5" text-anchor="middle" class="small">gray</text>
<line x1="130.0" y1="142.5" x2="180.0" y2="367.5" class="arrow flow-purple"/>
<rect x="85.0" y="237.0" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="155.0" y="255.0" text-anchor="middle" class="tiny">CAN H/L</text>
<line x1="180.0" y1="367.5" x2="440.0" y2="227.5" class="arrow flow-purple"/>
<line x1="440.0" y1="227.5" x2="700.0" y2="367.5" class="arrow flow-purple"/>
<line x1="440.0" y1="507.5" x2="700.0" y2="367.5" class="arrow flow-purple"/>
<line x1="700.0" y1="367.5" x2="980.0" y2="227.5" class="arrow flow-purple"/>
<line x1="700.0" y1="367.5" x2="980.0" y2="507.5" class="arrow flow-purple"/>
<line x1="980.0" y1="507.5" x2="1125.0" y2="627.5" class="arrow flow-purple"/>
<rect x="48" y="690" width="1184" height="42" rx="10" fill="#fff" stroke="#e2e8f0"/>
<text x="64" y="716" class="small">CAN-feil krever kontroll av terminering, spenning, skjerm, kontaktkorrosjon og riktig nettverksstandard.</text>
</svg>
