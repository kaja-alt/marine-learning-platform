<rect x="48" y="690" width="1184" height="42" rx="10" fill="#fff" stroke="#e2e8f0"/>
<text x="64" y="716" class="small">Luftlommer, feil kjølevæske, tett varmeveksler eller defekt termostat kan gi like symptomer.</text>
