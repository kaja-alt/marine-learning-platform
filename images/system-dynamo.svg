<text x="835.0" y="515.0" text-anchor="middle" class="small">orange</text>
<line x1="162.5" y1="355.0" x2="385.0" y2="355.0" class="arrow flow-slate"/>
<rect x="203.75" y="337.0" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="273.75" y="355.0" text-anchor="middle" class="tiny">drift</text>
<line x1="385.0" y1="355.0" x2="605.0" y2="347.5" class="arrow flow-slate"/>
