<text x="720.0" y="345.0" text-anchor="middle" class="tiny">feedback</text>
<line x1="835.0" y1="342.5" x2="605.0" y2="347.5" class="arrow flow-purple"/>
<rect x="650.0" y="327.0" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="720.0" y="345.0" text-anchor="middle" class="tiny">felt</text>
<line x1="605.0" y1="347.5" x2="1060.0" y2="335.0" class="arrow flow-blue"/>
<rect x="762.5" y="323.25" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="832.5" y="341.25" text-anchor="middle" class="tiny">lading</text>
<line x1="835.0" y1="342.5" x2="835.0" y2="495.0" class="arrow flow-orange"/>
<rect x="765.0" y="400.75" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="835.0" y="418.75" text-anchor="middle" class="tiny">varsel</text>
<rect x="48" y="690" width="1184" height="42" rx="10" fill="#fff" stroke="#e2e8f0"/>
<text x="64" y="716" class="small">Hylende reim, lav ladespenning og varm dynamo må vurderes samlet.</text>
</svg>
