<text x="473.75" y="337.5" text-anchor="middle" class="tiny">drift</text>
<line x1="580.0" y1="325.0" x2="800.0" y2="337.5" class="arrow flow-purple"/>
<rect x="620.0" y="313.25" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="690.0" y="331.25" text-anchor="middle" class="tiny">valg</text>
<line x1="800.0" y1="337.5" x2="1012.5" y2="350.0" class="arrow flow-purple"/>
<rect x="836.25" y="325.75" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="906.25" y="343.75" text-anchor="middle" class="tiny">reduksjon</text>
<line x1="580.0" y1="505.0" x2="580.0" y2="325.0" class="arrow flow-orange"/>
<rect x="510.0" y="397.0" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="580.0" y="415.0" text-anchor="middle" class="tiny">trykk</text>
<line x1="580.0" y1="325.0" x2="800.0" y2="505.0" class="arrow flow-orange"/>
<rect x="620.0" y="397.0" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="690.0" y="415.0" text-anchor="middle" class="tiny">varm olje</text>
<line x1="800.0" y1="505.0" x2="580.0" y2="505.0" class="arrow flow-cyan"/>
<rect x="620.0" y="487.0" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
<text x="690.0" y="505.0" text-anchor="middle" class="tiny">retur</text>
<rect x="48" y="690" width="1184" height="42" rx="10" fill="#fff" stroke="#e2e8f0"/>
<text x="64" y="716" class="small">Riktig olje, trykk, kjøling og koblingsjustering må kontrolleres før gear dømmes defekt.</text>
</svg>
