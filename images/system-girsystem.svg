<text x="367.5" y="342.0" text-anchor="middle" class="label">Input shaft</text>
<text x="367.5" y="370.0" text-anchor="middle" class="small">purple</text>
<rect x="500" y="260" width="160" height="130" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
<text x="580.0" y="317.0" text-anchor="middle" class="label">Clutch pack</text>
<text x="580.0" y="345.0" text-anchor="middle" class="small">purple</text>
<rect x="720" y="285" width="160" height="105" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
<text x="800.0" y="329.5" text-anchor="middle" class="label">Reduksjonsgear</text>
