<text x="580.0" y="525.0" text-anchor="middle" class="small">amber</text>
<rect x="720" y="465" width="160" height="80" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
<text x="800.0" y="497.0" text-anchor="middle" class="label">Oljekjøler</text>
<text x="800.0" y="525.0" text-anchor="middle" class="small">cyan</text>
<line x1="160.0" y1="350.0" x2="367.5" y2="350.0" class="arrow flow-purple"/>
<rect x="193.75" y="332.0" width="140" height="25" rx="12" fill="white" stroke="#e2e8f0"/>
