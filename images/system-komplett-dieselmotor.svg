<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
<title id="title">Komplett marine dieselmotor</title>
<desc id="desc">Hovedkomponenter og systemgrenser for reservedels- og supportarbeid</desc>

    <defs>
